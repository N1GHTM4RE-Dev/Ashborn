<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ashborn AktenSystem</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- STARTSEITE -->
  <main id="landingPage" class="landing-page">
    <div class="logo-wrap">
      <img
        src="assets/logo.png"
        alt="Ashborn Logo"
        id="mainLogo"
        class="main-logo"
      />
    </div>

    <section id="loginBox" class="login-box">
      <h1>Zugang zum AktenSystem</h1>
      <p>Gib das Systemkennwort ein.</p>

      <input
        type="password"
        id="passwordInput"
        placeholder="Kennwort"
        autocomplete="off"
      />

      <button id="loginBtn">Eintreten</button>

      <div id="loginError" class="login-error"></div>
    </section>
  </main>

  <!-- AKTENSYSTEM -->
  <section id="aktenSystem" class="akten-system hidden">

    <header class="akten-header">
      <div>
        <h1>Ashborn AktenSystem</h1>
        <p>Interne Aktenverwaltung</p>
      </div>

      <button id="logoutBtn" class="logout-btn">Abmelden</button>
    </header>

    <nav class="akten-tabs">
      <button class="tab-btn active" data-tab="searchTab">Akten suchen</button>
      <button class="tab-btn" data-tab="createTab">Akte erstellen</button>
      <button class="tab-btn" data-tab="settingsTab">System</button>
    </nav>

    <!-- SUCHEN -->
    <div id="searchTab" class="tab-content active">
      <div class="panel">
        <h2>Akten suchen</h2>

        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Nach Name, Inhalt, Kategorie oder Beschreibung suchen..."
        />

        <div id="aktenList" class="akten-list"></div>
      </div>
    </div>

    <!-- ERSTELLEN -->
    <div id="createTab" class="tab-content">
      <div class="panel">
        <h2>Neue Akte erstellen</h2>

        <label>Aktenname</label>
        <input type="text" id="akteTitle" placeholder="z. B. Person X / Vorfall / Bericht" />

        <label>Kategorie</label>
        <input type="text" id="akteCategory" placeholder="z. B. Mitglieder, Vorfälle, Handel, Fraktion" />

        <label>Kurze Beschreibung</label>
        <input type="text" id="akteDescription" placeholder="Kurze Zusammenfassung der Akte" />

        <label>Akteninhalt</label>
        <textarea id="akteContent" placeholder="Hier den vollständigen Inhalt der Akte eintragen..."></textarea>

        <button id="saveAkteBtn" class="save-btn">Akte speichern</button>

        <div id="saveInfo" class="save-info"></div>
      </div>
    </div>

    <!-- SYSTEM -->
    <div id="settingsTab" class="tab-content">
      <div class="panel">
        <h2>System</h2>

        <p>
          Dieses System läuft aktuell lokal im Browser.
          Später können wir hier Datenbank, Benutzerrechte, Rollen,
          Akten-Berechtigungen und weitere Reiter ergänzen.
        </p>

        <button id="clearLocalDataBtn" class="danger-btn">Lokale Testdaten löschen</button>
      </div>
    </div>

  </section>

  <script src="app.js"></script>
</body>
</html>
